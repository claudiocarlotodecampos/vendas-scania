<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metas de Vendas 2026 — Scania Cavese</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 820px;
    }

    /* HEADER */
    .header { margin-bottom: 40px; }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .header-badge .icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .header-badge span {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header h1 {
      color: white;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .header p {
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      font-weight: 500;
    }

    /* CARDS GRID */
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 280px;
      border-radius: 20px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      transition: border-color 0.4s ease;
    }
    .card.superada {
      border-color: var(--color, #10b981) !important;
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(16,185,129,0.04)) !important;
    }
    .card.superada .card-glow {
      display: block;
    }

    .card-glow {
      display: none;
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-alpha), transparent 70%);
      pointer-events: none;
    }

    /* CARD HEADER */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .card-icon { font-size: 22px; margin-bottom: 4px; }
    .card-title {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .badge-superada {
      display: none;
      background: var(--color-alpha);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--color);
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .card.superada .badge-superada { display: block; }

    /* GAUGE */
    .gauge-wrap { display: flex; justify-content: center; }
    svg.gauge { overflow: visible; }

    /* STATS */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .stat { text-align: center; flex: 1; }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: white;
      font-family: 'DM Mono', monospace;
      line-height: 1;
    }
    .stat-value.muted { color: rgba(255,255,255,0.35); }
    .stat-value.accent { color: var(--color); }
    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.08);
    }

    /* PROGRESS BAR */
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color-dim), var(--color));
      box-shadow: 0 0 10px var(--color-shadow);
      transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* EDIT AREA */
    .edit-area { display: flex; align-items: center; gap: 10px; }
    .edit-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      color: white;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      width: 90px;
      outline: none;
      display: none;
    }
    .edit-input:focus { border-color: var(--color); }
    .btn-save {
      background: var(--color);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      display: none;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.07);
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      display: none;
    }
    .btn-edit {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: 600;
      width: 100%;
      transition: all 0.2s ease;
    }
    .btn-edit:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    /* FOOTER */
    .footer {
      color: rgba(255,255,255,0.15);
      font-size: 11px;
      text-align: center;
      margin-top: 32px;
      letter-spacing: 1px;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-badge">
      <div class="icon">📊</div>
      <span>Scania Cavese</span>
    </div>
    <h1>Metas de Vendas</h1>
    <p id="subtitulo"></p>
  </div>

  <!-- CARDS -->
  <div class="cards">

    <!-- CARD CAMINHÕES -->
    <div class="card" id="card-caminhoes"
      style="--color:#10b981; --color-alpha:rgba(16,185,129,0.15); --color-border:rgba(16,185,129,0.35); --color-dim:rgba(16,185,129,0.5); --color-shadow:rgba(16,185,129,0.4)">
      <div class="card-glow"></div>
      <div class="card-header">
        <div>
          <div class="card-icon">🚛</div>
          <div class="card-title">Caminhões</div>
        </div>
        <div class="badge-superada">✓ META BATIDA</div>
      </div>
      <div class="gauge-wrap">
        <svg class="gauge" id="gauge-caminhoes" width="172" height="106"></svg>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="val-caminhoes">0</div>
          <div class="stat-label">REALIZADO</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-value muted">60</div>
          <div class="stat-label">META</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-value" id="diff-caminhoes">0</div>
          <div class="stat-label" id="diff-label-caminhoes">FALTAM</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-caminhoes" style="width:0%"></div>
      </div>
      <div class="edit-area" id="edit-caminhoes">
        <button class="btn-edit" onclick="startEdit('caminhoes')">✏️ ATUALIZAR REALIZADO</button>
        <input class="edit-input" id="input-caminhoes" type="number" min="0"/>
        <button class="btn-save" onclick="saveEdit('caminhoes')">Salvar</button>
        <button class="btn-cancel" onclick="cancelEdit('caminhoes')">✕</button>
      </div>
    </div>

    <!-- CARD CONSÓRCIO -->
    <div class="card" id="card-consorcio"
      style="--color:#3b82f6; --color-alpha:rgba(59,130,246,0.15); --color-border:rgba(59,130,246,0.35); --color-dim:rgba(59,130,246,0.5); --color-shadow:rgba(59,130,246,0.4)">
      <div class="card-glow"></div>
      <div class="card-header">
        <div>
          <div class="card-icon">🤝</div>
          <div class="card-title">Consórcio</div>
        </div>
        <div class="badge-superada">✓ META BATIDA</div>
      </div>
      <div class="gauge-wrap">
        <svg class="gauge" id="gauge-consorcio" width="172" height="106"></svg>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="val-consorcio">0</div>
          <div class="stat-label">REALIZADO</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-value muted">12</div>
          <div class="stat-label">META</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-value" id="diff-consorcio">12</div>
          <div class="stat-label" id="diff-label-consorcio">FALTAM</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-consorcio" style="width:0%"></div>
      </div>
      <div class="edit-area" id="edit-consorcio">
        <button class="btn-edit" onclick="startEdit('consorcio')">✏️ ATUALIZAR REALIZADO</button>
        <input class="edit-input" id="input-consorcio" type="number" min="0"/>
        <button class="btn-save" onclick="saveEdit('consorcio')">Salvar</button>
        <button class="btn-cancel" onclick="cancelEdit('consorcio')">✕</button>
      </div>
    </div>

  </div>
  <p class="footer">CLIQUE EM "ATUALIZAR REALIZADO" PARA EDITAR OS VALORES</p>
</div>

<script>
  const config = {
    caminhoes: { meta: 60, realizado: 90 },
    consorcio:  { meta: 12, realizado: 0  }
  };

  // Subtítulo dinâmico
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const now = new Date();
  document.getElementById('subtitulo').textContent =
    `Acompanhamento ${meses[now.getMonth()]} · ${now.getFullYear()} — Cláudio Carloto`;

  function drawGauge(id, percent, color, superMeta) {
    const svg = document.getElementById('gauge-' + id);
    const R = 80, stroke = 12, cx = R + stroke/2, cy = R + stroke/2;
    const r = R - stroke/2;
    const maxAngle = 180;
    const angle = Math.min(percent / 150, 1) * maxAngle;
    const toRad = a => (a - 180) * Math.PI / 180;
    const arc = (deg) => {
      const rad = toRad(deg);
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    };
    const start = arc(0);
    const end0 = arc(180);
    const endA = arc(angle);
    const largeArc = angle > 90 ? 1 : 0;

    svg.innerHTML = `
      <path d="M ${start.x} ${start.y} A ${r} ${r} 0 0 1 ${end0.x} ${end0.y}"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${stroke}" stroke-linecap="round"/>
      <path d="M ${start.x} ${start.y} A ${r} ${r} 0 0 1 ${endA.x} ${endA.y}"
        fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        style="filter:drop-shadow(0 0 8px ${color}88); transition: all 1.4s cubic-bezier(0.4,0,0.2,1)"/>
      <text x="${cx}" y="${cy - 10}" text-anchor="middle" fill="white"
        font-size="28" font-weight="700" font-family="DM Mono, monospace">${Math.round(percent)}%</text>
      ${superMeta ? `<text x="${cx}" y="${cy + 14}" text-anchor="middle" fill="${color}"
        font-size="11" font-weight="600" font-family="DM Sans, sans-serif" letter-spacing="1">SUPERADA</text>` : ''}
    `;
  }

  function updateCard(id) {
    const { meta, realizado } = config[id];
    const percent = meta > 0 ? (realizado / meta) * 100 : 0;
    const superMeta = percent >= 100;
    const color = id === 'caminhoes' ? '#10b981' : '#3b82f6';

    // Gauge
    drawGauge(id, percent, color, superMeta);

    // Números animados
    animateNumber('val-' + id, realizado);

    // Diff
    const diffEl = document.getElementById('diff-' + id);
    const labelEl = document.getElementById('diff-label-' + id);
    if (superMeta) {
      animateNumber('diff-' + id, realizado - meta);
      diffEl.classList.add('accent');
      diffEl.classList.remove('muted');
      labelEl.textContent = 'ACIMA';
    } else {
      animateNumber('diff-' + id, meta - realizado);
      diffEl.classList.remove('accent');
      labelEl.textContent = 'FALTAM';
    }

    // Barra
    const bar = document.getElementById('bar-' + id);
    setTimeout(() => { bar.style.width = Math.min(percent, 100) + '%'; }, 50);

    // Card estado
    const card = document.getElementById('card-' + id);
    if (superMeta) card.classList.add('superada');
    else card.classList.remove('superada');
  }

  function animateNumber(elId, target) {
    const el = document.getElementById(elId);
    const start = parseInt(el.textContent) || 0;
    const duration = 1200;
    const startTime = performance.now();
    const step = (now) => {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(start + (target - start) * eased);
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function startEdit(id) {
    const area = document.getElementById('edit-' + id);
    const inp = document.getElementById('input-' + id);
    area.querySelector('.btn-edit').style.display = 'none';
    inp.style.display = 'inline-block';
    area.querySelector('.btn-save').style.display = 'inline-block';
    area.querySelector('.btn-cancel').style.display = 'inline-block';
    inp.value = config[id].realizado;
    inp.focus();
    inp.onkeydown = e => { if (e.key === 'Enter') saveEdit(id); if (e.key === 'Escape') cancelEdit(id); };
  }

  function saveEdit(id) {
    const val = parseInt(document.getElementById('input-' + id).value);
    if (!isNaN(val) && val >= 0) {
      config[id].realizado = val;
      updateCard(id);
    }
    cancelEdit(id);
  }

  function cancelEdit(id) {
    const area = document.getElementById('edit-' + id);
    area.querySelector('.btn-edit').style.display = '';
    document.getElementById('input-' + id).style.display = 'none';
    area.querySelector('.btn-save').style.display = 'none';
    area.querySelector('.btn-cancel').style.display = 'none';
  }

  // Init
  updateCard('caminhoes');
  updateCard('consorcio');
</script>
</body>
</html>
